<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; base-uri 'self'; form-action 'self';"
    />
    <title>EL Parking — Account</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        display: grid; place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #eff0f4; color: #14151a;
      }
      @media (prefers-color-scheme: dark) { body { background: #0f1117; color: #e8eaf0; } .card { background: #1a1d24 !important; border-color: #2c2f3a !important; } input { background: #1e2128 !important; border-color: #2c2f3a !important; color: #e8eaf0 !important; } }
      .card {
        width: min(420px, 100%);
        background: #fff; border: 1px solid #d8dde5; border-radius: 24px;
        padding: 28px 24px; box-shadow: 0 20px 48px rgba(13,18,28,.12);
        text-align: center;
      }
      .brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 18px; }
      .brand img { width: 48px; height: 48px; border-radius: 14px; }
      .brand-text { text-align: left; }
      .overline { margin: 0; font-size: 10px; letter-spacing: .18em; font-weight: 700; color: #8a909c; }
      .brand-text h1 { margin: 0; font-size: 22px; }
      h2 { font-size: 20px; margin: 6px 0 4px; }
      p.muted { color: #6b7280; font-size: 15px; margin: 0 0 18px; }
      label { display: block; text-align: left; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
      input {
        width: 100%; padding: 13px 14px; font-size: 16px;
        border: 1px solid #d8dde5; border-radius: 14px; background: #f8f9fc;
      }
      button {
        width: 100%; margin-top: 18px; padding: 14px; min-height: 50px;
        font-size: 16px; font-weight: 700; color: #fff; cursor: pointer;
        background: #35c759; border: none; border-radius: 999px;
      }
      button:disabled { opacity: .6; cursor: default; }
      .error { color: #e5484d; font-size: 14px; margin-top: 12px; min-height: 18px; }
      .ok { color: #2db24d; }
      .spinner { font-size: 15px; color: #6b7280; }
      a.applink { display: inline-block; margin-top: 16px; color: #35c759; font-weight: 700; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="./app-icon.png" alt="" />
        <div class="brand-text">
          <p class="overline">KARLIN OFFICE PARKING</p>
          <h1>EL Parking</h1>
        </div>
      </div>
      <div id="content"><p class="spinner">Loading…</p></div>
    </main>
    <script type="module" src="./auth-action.js"></script>
  </body>
</html>
