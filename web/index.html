<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EL Parking Web - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      .card {
        width: min(560px, calc(100vw - 48px));
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 28px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>EL Parking Web is temporarily offline</h1>
      <p>
        Access has been disabled while security settings are being reviewed.
      </p>
    </main>
  </body>
</html>
